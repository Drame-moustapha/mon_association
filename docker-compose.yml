version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mon_association
      POSTGRES_USER: assoc_user
      POSTGRES_PASSWORD: change_me
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mon_association
      SPRING_DATASOURCE_USERNAME: assoc_user
      SPRING_DATASOURCE_PASSWORD: change_me
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
